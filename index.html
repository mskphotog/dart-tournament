<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- PWA theme color and description -->
    <meta name="theme-color" content="#00C2D1" />
    <meta name="description" content="Weekly soft-tip dart tournament tracker with live brackets and season standings" />

    <!-- PWA: tells iOS Safari this app can be installed as a standalone app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LIT Darts" />

    <!-- PWA: Apple touch icon shown on iOS home screen -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <title>Darts @ LIT</title>
  </head>
  <body>
    <!-- React mounts here -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
